<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#0f0f0f"/>

  <!-- Subtle red glow at bottom — liquid feel -->
  <ellipse cx="16" cy="31" rx="11" ry="5" fill="#dc2626" opacity="0.22"/>

  <!-- Bold hollow D letter (evenodd fills the gap) -->
  <path
    fill-rule="evenodd"
    clip-rule="evenodd"
    d="M7 7 H14 C22 7 24.5 10.5 24.5 16 C24.5 21.5 22 25 14 25 H7 Z
       M10.5 10.5 H14 C18.5 10.5 20.5 13 20.5 16 C20.5 19 18.5 21.5 14 21.5 H10.5 Z"
    fill="white"
  />

  <!-- Red O dot — top-right brand mark -->
  <circle cx="27" cy="6.5" r="3.8" fill="#dc2626"/>
</svg>
